<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拼豆图案生成器</title>
<style>
  :root {
    --bg: #f8f5f0;
    --card: #ffffff;
    --text: #2c2416;
    --muted: #8b7355;
    --accent: #d4845a;
    --border: #e0d6c8;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "Helvetica Neue", "PingFang SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  header {
    text-align: center;
    margin-bottom: 36px;
  }
  header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  header p {
    color: var(--muted);
    font-size: 14px;
  }

  .layout {
    display: flex;
    gap: 28px;
    align-items: flex-start;
  }

  /* ── left panel ── */
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    width: 340px;
    flex-shrink: 0;
  }
  .panel label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 4px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .panel input[type="range"] {
    width: 100%;
    margin-bottom: 18px;
    accent-color: var(--accent);
  }
  .range-row {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--muted);
    margin-top: 2px;
  }
  .panel input[type="file"] {
    width: 100%;
    margin-bottom: 18px;
    font-size: 13px;
  }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 18px;
  }
  .checkbox-row input {
    accent-color: var(--accent);
  }

  .btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.88; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 32px 16px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 18px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
  }
  .drop-zone img {
    max-width: 100%;
    max-height: 180px;
    border-radius: 6px;
    margin-bottom: 6px;
  }

  .info-text {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 14px;
    line-height: 1.5;
  }

  /* ── right panel ── */
  .preview-area {
    flex: 1;
    min-height: 400px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .preview-area .placeholder {
    color: var(--muted);
    font-size: 14px;
    text-align: center;
    padding: 40px;
  }
  .preview-area img {
    max-width: 100%;
    max-height: 80vh;
    cursor: pointer;
  }

  .spinner {
    display: none;
    width: 24px; height: 24px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin: 0 auto 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #download-link {
    display: none;
    text-align: center;
    margin-top: 12px;
  }
  #download-link a {
    color: var(--accent);
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
  }

  @media (max-width: 760px) {
    .layout { flex-direction: column; }
    .panel { width: 100%; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>拼豆图案生成器</h1>
    <p>上传图片 → 调参数 → 生成拼豆图纸，每个格子里有颜色编号</p>
  </header>

  <div class="layout">
    <!-- left: controls -->
    <div class="panel">
      <div class="drop-zone" id="drop-zone">
        <div id="drop-text">拖拽图片到这里<br>或点击选择文件</div>
        <img id="upload-preview" style="display:none" alt="">
      </div>
      <input type="file" id="file-input" accept="image/*" style="display:none">

      <label>画布宽度（拼豆数量）</label>
      <input type="range" id="width" min="10" max="150" value="50">
      <div class="range-row"><span>10</span><span id="width-val">50</span><span>150</span></div>

      <label>颜色数量</label>
      <input type="range" id="n-colors" min="3" max="40" value="12">
      <div class="range-row"><span>3</span><span id="n-colors-val">12</span><span>40</span></div>

      <label>每颗拼豆像素大小</label>
      <input type="range" id="bead-size" min="6" max="40" value="20">
      <div class="range-row"><span>6</span><span id="bead-size-val">20</span><span>40</span></div>

      <label>格子间距（像素）</label>
      <input type="range" id="grid" min="0" max="6" value="2">
      <div class="range-row"><span>0</span><span id="grid-val">2</span><span>6</span></div>

      <div class="checkbox-row">
        <input type="checkbox" id="show-numbers" checked>
        <label for="show-numbers" style="margin:0;letter-spacing:0;text-transform:none;font-weight:400;">
          格子里显示颜色编号
        </label>
      </div>

      <button class="btn" id="generate-btn" disabled>生成拼豆图纸</button>

      <div id="download-link">
        <a href="#" download="fuse_beads_result.png">下载结果 PNG</a>
      </div>
    </div>

    <!-- right: preview -->
    <div class="preview-area" id="preview-area">
      <div class="placeholder" id="placeholder">
        生成后的拼豆图纸<br>会显示在这里
      </div>
      <div class="spinner" id="spinner"></div>
      <img id="result-img" style="display:none" alt="拼豆结果">
    </div>
  </div>
</div>

<script>
  const dropZone = document.getElementById("drop-zone");
  const dropText = document.getElementById("drop-text");
  const fileInput = document.getElementById("file-input");
  const uploadPreview = document.getElementById("upload-preview");
  const generateBtn = document.getElementById("generate-btn");
  const resultImg = document.getElementById("result-img");
  const placeholder = document.getElementById("placeholder");
  const spinner = document.getElementById("spinner");
  const downloadLink = document.getElementById("download-link");
  const downloadA = downloadLink.querySelector("a");

  let uploadedFile = null;

  // ── sliders → live value display ──
  ["width","n-colors","bead-size","grid"].forEach(id => {
    const el = document.getElementById(id);
    const val = document.getElementById(id + "-val");
    el.addEventListener("input", () => { val.textContent = el.value; });
  });

  // ── file handling ──
  dropZone.addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", (e) => {
    if (e.target.files.length) loadFile(e.target.files[0]);
  });

  dropZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropZone.classList.add("dragover");
  });
  dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("dragover");
  });
  dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
  });

  function loadFile(file) {
    uploadedFile = file;
    generateBtn.disabled = false;
    const reader = new FileReader();
    reader.onload = (e) => {
      uploadPreview.src = e.target.result;
      uploadPreview.style.display = "block";
      dropText.style.display = "none";
    };
    reader.readAsDataURL(file);
  }

  // ── generate ──
  generateBtn.addEventListener("click", async () => {
    if (!uploadedFile) return;

    generateBtn.disabled = true;
    generateBtn.textContent = "正在生成...";
    placeholder.style.display = "none";
    resultImg.style.display = "none";
    spinner.style.display = "block";
    downloadLink.style.display = "none";

    const form = new FormData();
    form.append("image", uploadedFile);
    form.append("width", document.getElementById("width").value);
    form.append("n_colors", document.getElementById("n-colors").value);
    form.append("bead_size", document.getElementById("bead-size").value);
    form.append("grid", document.getElementById("grid").value);
    form.append("show_numbers", document.getElementById("show-numbers").checked ? "1" : "0");

    try {
      const resp = await fetch("/generate", { method: "POST", body: form });
      if (!resp.ok) {
        const text = await resp.text();
        throw new Error(text || "Server error");
      }
      const blob = await resp.blob();
      const url = URL.createObjectURL(blob);

      resultImg.src = url;
      resultImg.style.display = "block";
      downloadA.href = url;
      downloadLink.style.display = "block";
    } catch (err) {
      placeholder.textContent = "出错了：" + err.message;
      placeholder.style.display = "block";
    } finally {
      spinner.style.display = "none";
      generateBtn.disabled = false;
      generateBtn.textContent = "生成拼豆图纸";
    }
  });

  // ── click result to download ──
  resultImg.addEventListener("click", () => downloadA.click());
</script>
</body>
</html>
